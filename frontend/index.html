<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Truck & Roll - MVC vs MVVM</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1b1f24;
        --muted: #606975;
        --border: #d9dee7;
        --mvc: #0f766e;
        --mvvm: #7c3aed;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 20px 28px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      main {
        max-width: 1160px;
        margin: 0 auto;
        padding: 24px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input {
        width: 120px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 15px;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: #1f2937;
        border-color: #1f2937;
        color: #ffffff;
      }

      button:hover {
        filter: brightness(0.97);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        min-height: 360px;
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }

      .panel h2 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      .badge {
        align-self: start;
        padding: 5px 8px;
        border-radius: 999px;
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
      }

      .badge.mvc {
        background: var(--mvc);
      }

      .badge.mvvm {
        background: var(--mvvm);
      }

      .content {
        padding: 16px;
      }

      .tracking {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .metric {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fafbfc;
      }

      .metric span {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        font-size: 18px;
      }

      pre {
        min-height: 220px;
        margin: 0;
        padding: 14px;
        overflow: auto;
        border-radius: 6px;
        background: #111827;
        color: #e5e7eb;
        font-size: 13px;
        line-height: 1.45;
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .log {
        display: grid;
        gap: 8px;
        max-height: 150px;
        margin-top: 14px;
        overflow: auto;
        color: var(--muted);
        font-size: 13px;
      }

      .log div {
        padding: 8px 10px;
        border-left: 3px solid var(--mvvm);
        background: #fafbfc;
      }

      @media (max-width: 820px) {
        main {
          padding: 16px;
        }

        .grid,
        .tracking {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Truck & Roll - MVC vs MVVM</h1>
      <p>MVC muestra la orden completa. MVVM muestra estado listo para una pantalla mobile.</p>
    </header>

    <main>
      <section class="toolbar">
        <label>
          Order ID
          <input id="orderId" type="number" min="1" value="1" />
        </label>
        <button class="primary" id="loadBoth">Cargar comparación</button>
        <button class="primary" id="createDemo">Crear orden demo + auto UI</button>
        <button data-status="preparing">Preparando</button>
        <button data-status="ready">Listo</button>
        <button data-status="delivered">Entregado</button>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>MVC REST</h2>
              <p><code>GET /orders/{id}</code></p>
            </div>
            <span class="badge mvc">data cruda</span>
          </div>
          <div class="content">
            <pre id="mvcOutput">Sin datos todavía.</pre>
          </div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>MVVM Tracking</h2>
              <p><code>GET /mvvm/orders/{id}/tracking</code></p>
            </div>
            <span class="badge mvvm">estado view</span>
          </div>
          <div class="content">
            <div class="tracking">
              <div class="metric">
                <span>orderStatus</span>
                <strong id="orderStatus">-</strong>
              </div>
              <div class="metric">
                <span>estimatedTime</span>
                <strong id="estimatedTime">-</strong>
              </div>
              <div class="metric">
                <span>isLoading</span>
                <strong id="isLoading">-</strong>
              </div>
            </div>
            <pre id="mvvmOutput">Sin datos todavía.</pre>
            <div class="log" id="viewLog"></div>
          </div>
        </article>
      </section>

      <p class="status" id="statusText"></p>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let demoTimers = [];
      let viewModelState = {
        orderStatus: "-",
        estimatedTime: "-",
        isLoading: false,
      };

      function pretty(data) {
        return JSON.stringify(data, null, 2);
      }

      function currentOrderId() {
        return $("orderId").value || "1";
      }

      function setStatus(text, isError = false) {
        $("statusText").textContent = text;
        $("statusText").className = isError ? "status error" : "status";
      }

      function addLog(text) {
        const row = document.createElement("div");
        row.textContent = `${new Date().toLocaleTimeString()} - ${text}`;
        $("viewLog").prepend(row);
      }

      function clearDemoTimers() {
        demoTimers.forEach((timer) => clearTimeout(timer));
        demoTimers = [];
      }

      function renderViewFromViewModel() {
        $("orderStatus").textContent = viewModelState.orderStatus;
        $("estimatedTime").textContent =
          typeof viewModelState.estimatedTime === "number"
            ? `${viewModelState.estimatedTime} min`
            : viewModelState.estimatedTime;
        $("isLoading").textContent = String(viewModelState.isLoading);
        $("mvvmOutput").textContent = pretty(viewModelState);
      }

      function setViewModelState(nextState) {
        const previousStatus = viewModelState.orderStatus;
        viewModelState = { ...viewModelState, ...nextState };
        renderViewFromViewModel();

        if (nextState.orderStatus && previousStatus !== nextState.orderStatus) {
          addLog(`ViewModel cambio orderStatus: ${previousStatus} -> ${nextState.orderStatus}. La View se redibujo.`);
        }
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Error de request");
        }
        return data;
      }

      async function loadMvc() {
        const data = await fetchJson(`/orders/${currentOrderId()}`);
        $("mvcOutput").textContent = pretty(data);
      }

      async function loadMvvm() {
        setViewModelState({ isLoading: true });
        const data = await fetchJson(`/mvvm/orders/${currentOrderId()}/tracking`);
        setViewModelState(data);
      }

      async function loadBoth() {
        setStatus("Cargando...");
        try {
          await Promise.all([loadMvc(), loadMvvm()]);
          setStatus("Comparación cargada.");
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function updateOrderStatus(newStatus) {
        setStatus(`Actualizando estado a ${newStatus}...`);
        try {
          await fetchJson(`/orders/${currentOrderId()}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: newStatus }),
          });
          await loadMvvm();
          setStatus(`Estado actualizado a ${newStatus}. MVC queda igual hasta pedir la orden otra vez.`);
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function createDemoOrder() {
        clearDemoTimers();
        setStatus("Creando orden demo...");
        try {
          const order = await fetchJson("/orders/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              items: [{ menu_item_id: 1, quantity: 1 }],
              payment_method: "online",
            }),
          });

          $("orderId").value = order.id;
          $("mvcOutput").textContent = pretty(order);
          await loadMvvm();
          addLog("Orden creada. El ViewModel empieza en pending.");
          setStatus("Orden creada. MVVM se actualiza cada 5 segundos; MVC queda como snapshot inicial.");

          const flow = ["preparing", "ready", "delivered"];
          flow.forEach((nextStatus, index) => {
            const timer = setTimeout(() => updateOrderStatus(nextStatus), (index + 1) * 5000);
            demoTimers.push(timer);
          });
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      $("loadBoth").addEventListener("click", loadBoth);
      $("createDemo").addEventListener("click", createDemoOrder);
      document.querySelectorAll("[data-status]").forEach((button) => {
        button.addEventListener("click", () => updateOrderStatus(button.dataset.status));
      });

      loadBoth();
    </script>
  </body>
</html>
